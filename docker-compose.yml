name: trinity-software

services:

  # ── Infraestrutura ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:17.4
    environment:
      POSTGRES_USER: trinity
      POSTGRES_PASSWORD: trinity123
      POSTGRES_DB: jiujitsu
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - trinity-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trinity -d jiujitsu"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.1-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "15672:15672"   # painel de gestão
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - trinity-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"     # UI do MailHog
    networks:
      - trinity-network

  # ── Evolution API Stack ─────────────────────────────────────────────────────

  evolution-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution123
      POSTGRES_DB: evolution
    volumes:
      - evolution-postgres-data:/var/lib/postgresql/data
    networks:
      - trinity-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 10

  evolution-redis:
    image: redis:7-alpine
    volumes:
      - evolution-redis-data:/data
    networks:
      - trinity-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  evolution-api:
    image: evoapicloud/evolution-api:latest
    ports:
      - "8080:8080"
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_ENABLED: "true"
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution123@evolution-postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: jiujitsu-dev-key
      SERVER_URL: http://localhost:8080
      TZ: America/Sao_Paulo
      DOCKER_ENV: "true"
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy
    networks:
      - trinity-network

  # ── Aplicação ───────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: JiuJitsu.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__jiujitsu-db: Host=postgres;Port=5432;Database=jiujitsu;Username=trinity;Password=trinity123
      ConnectionStrings__rabbitmq: amqp://guest:guest@rabbitmq:5672
      EvolutionApi__BaseUrl: http://evolution-api:8080
      EvolutionApi__ApiKey: jiujitsu-dev-key
      EvolutionApi__Instance: jiujitsu
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - trinity-network

  worker:
    build:
      context: .
      dockerfile: JiuJitsu.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__jiujitsu-db: Host=postgres;Port=5432;Database=jiujitsu;Username=trinity;Password=trinity123
      ConnectionStrings__rabbitmq: amqp://guest:guest@rabbitmq:5672
      EvolutionApi__BaseUrl: http://evolution-api:8080
      EvolutionApi__ApiKey: jiujitsu-dev-key
      EvolutionApi__Instance: jiujitsu
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - trinity-network

  frontend:
    build:
      context: jiujitsu-front
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - trinity-network

# ── Volumes ─────────────────────────────────────────────────────────────────

volumes:
  postgres-data:
  rabbitmq-data:
  evolution-postgres-data:
  evolution-redis-data:

# ── Rede ────────────────────────────────────────────────────────────────────

networks:
  trinity-network:
    driver: bridge
